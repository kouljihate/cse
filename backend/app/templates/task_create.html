{% extends "dashboard_base.html" %}

{% block title %}{{ _('create_task') }} - {{ _('app_name') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h4 class="mb-4"><i class="bi bi-plus-circle me-2"></i>{{ _('create_task') }}</h4>

        <div class="card">
            <div class="card-body">
                <form id="taskForm" onsubmit="return handleCreate(event)">
                    <div class="mb-3">
                        <label class="form-label">{{ _('task_title') }} *</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('task_description') }}</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>

                    <div id="taskError" class="alert alert-danger d-none"></div>
                    <button type="submit" class="btn btn-cse">
                        <i class="bi bi-check-lg me-1"></i>{{ _('create_task') }}
                    </button>
                    <a href="/tasks" class="btn btn-secondary ms-2">{{ _('cancel') }}</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function handleCreate(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('taskError');
    errorEl.classList.add('d-none');

    const body = {
        title: form.title.value,
        description: form.description.value,
    };

    const data = await apiRequest('/tasks/', {
        method: 'POST',
        body: JSON.stringify(body),
    });

    if (data._id) {
        showToast('{{ _('create_task') }} {{ _('successful') }}');
        window.location.href = '/tasks';
    } else {
        errorEl.textContent = data.error || '{{ _('create_task') }} failed';
        errorEl.classList.remove('d-none');
    }
    return false;
}
</script>
{% endblock %}
