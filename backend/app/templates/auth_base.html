{% extends "base.html" %}

{% block body %}
<div class="login-container">
    <div class="login-card card shadow-lg">
        <div class="card-body text-center">
            <div class="login-logo mb-3">
                <i class="bi bi-building-gear"></i>
            </div>
            <h3 class="fw-bold mb-1" style="white-space:nowrap;font-size:clamp(1rem,4vw,1.5rem)">{{ _('app_name') }}</h3>
            <p class="text-muted mb-4">{{ _('app_tagline') }}</p>

            {% block auth_content %}{% endblock %}

            <hr class="my-4">
            <div class="language-selector">
                <div class="btn-group btn-group-sm" role="group">
                    <a href="?lang=en" class="btn btn-outline-secondary {{ 'active btn-primary text-white' if lang == 'en' }}">EN</a>
                    <a href="?lang=ar" class="btn btn-outline-secondary {{ 'active btn-primary text-white' if lang == 'ar' }}">AR</a>
                    <a href="?lang=fr" class="btn btn-outline-secondary {{ 'active btn-primary text-white' if lang == 'fr' }}">FR</a>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="auth-footer">
    <span class="version-badge">v{{ version }}</span>
</div>
{% endblock %}
