{% extends "base.html" %}

{% block body %}
<div class="login-container">
    <div class="login-card card shadow-lg">
        <div class="card-body text-center">
            <div class="login-logo mb-3">
                <i class="bi bi-building-gear"></i>
            </div>
            <h3 class="fw-bold mb-1" style="white-space:nowrap;font-size:clamp(1rem,4vw,1.5rem)">{{ _('app_name') }}</h3>
            <p class="text-muted mb-4">{{ _('app_tagline') }}</p>

            {% block auth_content %}{% endblock %}

            <hr class="my-4">
            <div class="auth-card-footer">
                <span class="version-badge">v{{ version }}</span>
                <div class="language-selector">
                    <div class="btn-group btn-group-sm" role="group">
                        <a href="?lang=en" class="btn btn-outline-secondary {{ 'active btn-primary text-white' if lang == 'en' }}">EN</a>
                        <a href="?lang=ar" class="btn btn-outline-secondary {{ 'active btn-primary text-white' if lang == 'ar' }}">عربي</a>
                        <a href="?lang=fr" class="btn btn-outline-secondary {{ 'active btn-primary text-white' if lang == 'fr' }}">FR</a>
                    </div>
                </div>
                <span id="db-status" class="db-status-icon" title="{{ _('database_status') }}">
                    <i class="bi bi-database"></i>
                </span>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var dbIcon = document.getElementById('db-status');
    if (!dbIcon) return;

    function checkDb() {
        fetch('/api/health')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.db === 'connected') {
                    dbIcon.className = 'db-status-icon db-ok';
                } else {
                    dbIcon.className = 'db-status-icon db-err';
                }
            })
            .catch(function() {
                dbIcon.className = 'db-status-icon db-err';
            });
    }

    checkDb();
    setInterval(checkDb, 30000);
})();
</script>
{% endblock %}
